# docker-compose.yml
# This file lets you spin up the ENTIRE application stack with one command:
#   docker-compose up
#
# It defines 3 services:
#   1. db      - MySQL database
#   2. backend - FastAPI Python server
#   3. frontend - React app (served via npm start)
#
# Docker Compose handles the networking between them automatically.
# The backend can reach the database via the hostname "db".

version: '3.8'

services:

  # ── MySQL Database ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: user_management_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"          # Expose MySQL port to host (for tools like MySQL Workbench)
    volumes:
      - mysql_data:/var/lib/mysql   # Persist database data across restarts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"          # FastAPI listens on port 8000
    environment:
      # Override .env values for Docker environment
      DATABASE_URL: mysql+pymysql://appuser:apppassword@db:3306/user_management_db
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy   # Wait for MySQL to be ready before starting
    volumes:
      - ./backend:/app     # Mount backend code for hot reload

  # ── React Frontend ──────────────────────────────────────────────
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"          # React dev server
    command: sh -c "npm install && npm start"
    environment:
      - CHOKIDAR_USEPOLLING=true   # Required for file watching inside Docker
    depends_on:
      - backend

# Named volume for persisting MySQL data
volumes:
  mysql_data:
